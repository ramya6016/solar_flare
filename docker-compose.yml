version: '3.8'
services:
  # Redpanda: Using only ~500MB RAM compared to Kafka's 1.5GB+
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.1
    command:
      - redpanda start
      - --smp 1
      - --memory 512M 
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"

  # InfluxDB: To store the results
  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=password123
      - DOCKER_INFLUXDB_INIT_ORG=space_org
      - DOCKER_INFLUXDB_INIT_BUCKET=solar_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=dDKt36p-oYnheiM38fqTR5dlTzht9j7r4jg6yG9hhodSZrnRIrlZUO9Ie3sHHEBKq70ggbNvza0mFqT39IDLkw==