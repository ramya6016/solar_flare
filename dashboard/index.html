<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Solar Mission Control | Deep Space</title>
    <style>
        body { margin: 0; background: #000; color: #00ffcc; font-family: 'Segoe UI', monospace; overflow: hidden; }
        
        #hud {
            position: absolute; top: 20px; left: 20px; padding: 25px;
            background: rgba(0, 10, 10, 0.9); border: 1px solid #004444;
            border-left: 5px solid #00ffcc; z-index: 10; width: 280px;
        }

        .label { font-size: 10px; color: #008888; text-transform: uppercase; letter-spacing: 2px; margin-top: 12px; }
        .value { font-size: 20px; display: block; margin-bottom: 5px; color: #00ffcc; }
        
        #status-text { font-weight: bold; }
        .status-normal { color: #00ffcc; }
        .status-xclass { color: #ff3300; text-shadow: 0 0 10px #ff3300; }

        #alert-banner {
            position: absolute; top: 20px; right: 20px; color: #ff0000;
            font-size: 26px; font-weight: bold; display: none;
            padding: 15px; background: rgba(50, 0, 0, 0.8); border: 2px solid #ff0000;
            animation: blink 0.7s infinite; z-index: 100;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <div id="hud">
        <div class="label">Operational Status</div>
        <div class="value" id="status-text">SYNCING...</div>
        
        <div class="label">Satellite Epoch</div>
        <div class="value" id="time-display">--:--:--</div>

        <div class="label">X-Ray Flux Intensity</div>
        <div class="value" id="flux-val">0.00e+00</div>

        <div class="label">Heliocentric Vector (X, Z)</div>
        <div class="value" id="coords">0.00, 0.00</div>
    </div>

    <div id="alert-banner">⚠️ CRITICAL: X-CLASS SOLAR FLARE ⚠️</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 80, 0); 
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const loader = new THREE.TextureLoader();
        
        // 1. Sun
        const sun = new THREE.Mesh(
            new THREE.SphereGeometry(8, 64, 64),
            new THREE.MeshStandardMaterial({ 
                map: loader.load('sun.jpg'), 
                emissive: 0xffaa00, 
                emissiveIntensity: 0.6 
            })
        );
        scene.add(sun);

        // 2. High Intensity Aura (Flare Glow)
        const aura = new THREE.Mesh(
            new THREE.SphereGeometry(8.5, 64, 64),
            new THREE.MeshBasicMaterial({ 
                color: 0xffcc00, 
                transparent: true, 
                opacity: 0.4, 
                side: THREE.BackSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            })
        );
        scene.add(aura);

        // 3. Earth's Orbit Path (Restored & Bold)
        const orbitCurve = new THREE.EllipseCurve(0, 0, 32, 22, 0, 2 * Math.PI);
        const orbitPath = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(orbitCurve.getPoints(128)),
            new THREE.LineBasicMaterial({ 
                color: 0x00ffff, 
                transparent: true, 
                opacity: 0.5  // Increased opacity so it's clearly visible
            })
        );
        orbitPath.rotation.x = Math.PI / 2;
        scene.add(orbitPath);

        // 4. Earth
        const earth = new THREE.Mesh(
            new THREE.SphereGeometry(2, 32, 32),
            new THREE.MeshStandardMaterial({ map: loader.load('earth.jpg') })
        );
        scene.add(earth);

        // Lighting
        scene.add(new THREE.PointLight(0xffffff, 5000, 600));
        scene.add(new THREE.AmbientLight(0xffffff, 0.3));

        function updateUI(flux, timeStr, x, z) {
            document.getElementById('flux-val').innerText = flux.toExponential(2);
            document.getElementById('time-display').innerText = timeStr;
            document.getElementById('coords').innerText = `${x.toFixed(2)}, ${z.toFixed(2)}`;

            const statusEl = document.getElementById('status-text');
            const alertEl = document.getElementById('alert-banner');
            
            if (flux >= 0.0001) {
                statusEl.innerText = "X-CLASS FLARE";
                statusEl.className = "value status-xclass";
                alertEl.style.display = "block";
                aura.material.color.setHex(0xff3300);
                aura.scale.setScalar(1.3);
            } else {
                statusEl.innerText = "NORMAL";
                statusEl.className = "value status-normal";
                alertEl.style.display = "none";
                aura.material.color.setHex(0xffcc00);
                aura.scale.setScalar(1.0);
            }

            earth.position.set(x, 0, z);
        }

        async function poll() {
            try {
                const fRes = await fetch('http://localhost:8000/api/live-flux');
                const fData = await fRes.json();
                const pRes = await fetch('http://localhost:8000/api/earth-position');
                const pData = await pRes.json();
                updateUI(fData.flux, fData.time, pData.x, pData.z);
            } catch (e) {
                document.getElementById('status-text').innerText = "OFFLINE";
            }
        }

        setInterval(poll, 3000);
        function animate() { 
            requestAnimationFrame(animate); 
            sun.rotation.y += 0.002; 
            renderer.render(scene, camera); 
        }
        animate();
        poll();
    </script>
</body>
</html>
